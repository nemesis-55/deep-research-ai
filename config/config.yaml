# Deep Research AI — Configuration
# All paths are relative to the project root or absolute local paths.
# No external drive dependencies — everything lives inside cache/ (git-ignored).

huggingface:
  # Leave blank — token loaded from HF_TOKEN env variable or .env file
  token: ""

# ── Storage (all local, inside project) ───────────────────────────────────────
storage:
  base:            "cache"
  models:          "cache/models"
  vector_db:       "cache/vector_db"
  uploads:         "cache/uploads"
  knowledge_graph: "cache/knowledge_graph.json"
  hf_cache:        "cache/hub"             # HuggingFace model weights (MLX)

# ── Model registry ─────────────────────────────────────────────────────────────
# runtime: "mlx" → Apple Silicon GPU via mlx-lm
# One model in memory at a time — sequential swap enforced by model_manager.
#
# Memory budget (16 GB unified):
#   planner  (DeepSeek-R1 8B  4-bit) ≈ 5.0 GB
#   writer   (Qwen2.5-7B      4-bit) ≈ 4.0 GB
#   chat     (Qwen2.5-7B      4-bit) ≈ 4.0 GB  ← same weights, different role
#   embedder (bge-small-en)          ≈ 0.1 GB  ← always loaded
models:
  planner:
    name:           "DeepSeek-R1-Distill-Llama-8B (MLX 4-bit)"
    runtime:        mlx
    mlx_repo:       "mlx-community/DeepSeek-R1-Distill-Llama-8B-4bit"
    context_length: 8192
    max_new_tokens: 1024
    temperature:    0.6

  writer:
    name:           "Qwen2.5-7B-Instruct (MLX 4-bit)"
    runtime:        mlx
    mlx_repo:       "mlx-community/Qwen2.5-7B-Instruct-4bit"
    context_length: 32768
    max_new_tokens: 4096
    temperature:    0.7

  chat:
    name:           "Qwen2.5-7B-Instruct (MLX 4-bit)"
    runtime:        mlx
    mlx_repo:       "mlx-community/Qwen2.5-7B-Instruct-4bit"
    context_length: 32768
    max_new_tokens: 4096
    temperature:    0.7

  embedding:
    name:    "BAAI/bge-small-en-v1.5"
    hf_repo: "BAAI/bge-small-en-v1.5"

# ── Server ─────────────────────────────────────────────────────────────────────
server:
  host: 0.0.0.0
  port: 8000

# ── Search ─────────────────────────────────────────────────────────────────────
search:
  max_results:         50    # DDG result pool for deep research (10 / 20 / 50 / 100)
  max_pages_to_scrape: 10    # pages scraped per deep-research task

# ── Vector DB ──────────────────────────────────────────────────────────────────
vector_db:
  collection:    research_memory
  chunk_size:    1000
  chunk_overlap: 150

# ── Knowledge Graph ────────────────────────────────────────────────────────────
knowledge_graph:
  max_entities_per_source: 20
  min_confidence:          0.5

# ── Deep Crawl ─────────────────────────────────────────────────────────────────
# Phase-0 multi-query fan-out crawl before the main research tasks.
# num_queries:        how many diverse queries to generate from the topic
# results_per_query:  DDG results per query (10 / 20 / 50 / 100)
# refine_threshold:   if fewer articles stored, run a second crawl pass
deep_crawl:
  enabled:           true
  num_queries:       10
  results_per_query: 50    # configurable: 10 | 20 | 50 | 100
  refine_threshold:  8
  rag_top_k:         10

# ── Research pipeline ──────────────────────────────────────────────────────────
# max_results_per_task: DDG results fetched per research sub-task (10 / 20 / 50 / 100)
# max_pages_per_task:   pages actually scraped & analysed from those results (≤ max_results)
research:
  max_results_per_task: 50   # configurable: 10 | 20 | 50 | 100
  max_pages_per_task:   10   # configurable: 3 | 5 | 10 | 20
  research_loops:       3
  max_content_chars:    30000
  chunk_size:           1000
  chunk_overlap:        150
  extract_images:       true
  extract_youtube:      true
  follow_links:         true
  follow_links_depth:   1
  max_follow_links:     3
  sequential_loading:   true
  source_min_score:     50

# ── Generation defaults ────────────────────────────────────────────────────────
generation:
  top_p: 0.9

# ── Metrics logging ────────────────────────────────────────────────────────────
metrics_log:
  interval_s: 30
  keep_days:   7
  dir:         "logs/metrics"
